# Dependabot configuration
# Schedule: weekly, Mondays at 09:00 UTC. Group minor/patch updates into
# single PRs to keep PR noise down. Major updates get their own PR for
# review.
version: 2

updates:
  # --- Backend: pip ---
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      python-major:
        applies-to: version-updates
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"

  # --- Frontend: npm ---
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-major:
        applies-to: version-updates
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"

  # --- Docker base images ---
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 3
    rebase-strategy: "auto"
