name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ENVIRONMENT: test

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy app/
        continue-on-error: true
        # Advisory: surfaces type errors but does not block. Promote to blocking
        # once the remaining public-function return-type hints (audit M12) are added.

      - name: Bandit (security scan)
        run: bandit -r app/ -ll
        continue-on-error: true
        # Advisory: surfaces findings but does not block. Promote to blocking
        # once the bandit baseline is clean.

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt
        continue-on-error: true
        # Advisory: surfaces findings but does not block. Promote to blocking
        # once the dependency vulnerability baseline is clean.

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
          MASTER_INVITE_CODE: ci_test_invite_code
          STORAGE_BACKEND: local
          CELERY_ALWAYS_EAGER: "true"

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
        # Advisory: surfaces type errors but does not block. Promote to blocking
        # once the strict-TS baseline is clean.

      - name: Unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
        # Advisory: surfaces findings but does not block. Promote to blocking
        # once the npm dependency vulnerability baseline is clean.

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: eurogrant-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: eurogrant-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
