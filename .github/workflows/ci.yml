name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ENVIRONMENT: test

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy app/
        # Security: Blocking on type errors prevents missing logic flaws from merging.

      - name: Bandit (security scan)
        run: bandit -r app/ -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test_ci.db
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          JWT_SECRET: test_secret_key_for_ci
          STORAGE_BACKEND: local
          CELERY_ALWAYS_EAGER: "true"

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
        # Security: Blocking on type errors prevents missing logic flaws from merging.

      - name: Unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: npm audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          directory: frontend/coverage
          flags: frontend

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend image
        id: build-backend
        # Intentional retry pattern: continue on error here, retry in the next step to mitigate transient Docker/network failures.
        continue-on-error: true
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          push: false
          tags: eurogrant-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retry backend image build
        if: steps.build-backend.outcome == 'failure'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          push: false
          tags: eurogrant-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        id: build-frontend
        # Intentional retry pattern: continue on error here, retry in the next step to mitigate transient Docker/network failures.
        continue-on-error: true
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          push: false
          tags: eurogrant-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retry frontend image build
        if: steps.build-frontend.outcome == 'failure'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          push: false
          tags: eurogrant-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: [backend, frontend, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging environment..."
        # Add actual deployment steps here

  notify-failure:
    needs: [backend, frontend, docker-build, deploy-staging]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify on failure
        run: echo "Pipeline failed! Sending notification..."
        # Add actual slack/email notification action here
