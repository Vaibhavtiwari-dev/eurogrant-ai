# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  branch: main
  require_ci_to_pass: true
  notify:
    after_n_builds: 4  # backend pytest, backend mypy, frontend vitest, frontend playwright
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "70...85"
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
        only_pulls: false
    changes:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
        only_pulls: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      jump: no
      macro: no
  javascript:
    enable_partials: yes

flag_management:
  default_rules:
    carryforward: true
    statuses:
      - type: project
        target: 80%
        threshold: 1%
      - type: patch
        target: 80%
        threshold: 5%
  individual_flags:
    - name: backend
      paths:
        - backend/app/
    - name: frontend
      paths:
        - frontend/src/

comment:
  layout: "header, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

github_checks:
  annotations: true
