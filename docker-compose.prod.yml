# docker-compose.prod.yml
# NOTE: Prod MUST be launched with both -f flags so the dev override is never the accidental default:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up
services:
  nginx:
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:80:8080"
  backend:
    restart: unless-stopped
  worker:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  beat:
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    restart: unless-stopped
  db:
    restart: unless-stopped
  redis:
    restart: unless-stopped
