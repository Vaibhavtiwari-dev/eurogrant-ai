upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

# Per-IP rate limit for the /api/ location: 10 req/s sustained, burst 20.
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# gzip is per-server; declare the MIME map once.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml;

server {
    listen 8080;
    server_name _;

    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # TLS Termination Architecture
    # SECURITY NOTE: This Nginx instance is designed as an internal reverse proxy.
    # TLS termination (HTTPS) must be handled upstream by a Cloud Load Balancer
    # (e.g., AWS ALB, Cloudflare, or GCP Load Balancer) before reaching this service.
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Per-request CSP (with nonce) is set by Next.js middleware; this is a
    # fallback for non-HTML responses served by nginx directly.
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Buffer settings
    proxy_buffering on;
    proxy_buffers 8 16k;
    proxy_buffer_size 4k;
    proxy_busy_buffers_size 32k;
    proxy_max_temp_file_size 1024m;

    # Timeout settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_pass_request_headers on;

        # Strip /api prefix if backend doesn't expect it
        proxy_set_header X-Original-URI $request_uri;
    }

    # Frontend proxy
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for dev server / HMR
        proxy_read_timeout 300s;
    }
}
